id: "2.01"
slug: web-form-to-crm
version: 1
title: Web Form → CRM
description: |
  Receives a form submission from the tenant's website, validates it,
  normalizes UTM parameters, and creates (or updates) a contact in the
  tenant's CRM with source attribution.

category_id: 2
topology: T2
drivers:
  - github
  - vercel

artifacts:
  code: workflows/2.01-web-form-to-crm.code.js

credentials_required:
  - key: SUITEDASH_API_KEY
    source: tenant
    description: "SuiteDash API key"
  - key: CRM_VENDOR
    source: customer-input
    description: "Which CRM (suitedash|hubspot|servicetitan)"

env_schema:
  CRM_VENDOR:
    required: true
    enum: [suitedash, hubspot, servicetitan, housecallpro]
    default: suitedash
  ALLOWED_ORIGIN:
    required: true
    prompt: "Your website origin (e.g. https://acme.com)"

webhooks:
  inbound:
    - name: submit
      path: /submit
      method: POST
      signing: none
  outbound: []

triggers:
  - type: form_submit

depends_on: []

data_sensitivity: customer_pii
estimated_monthly_tokens: 0

health_check:
  type: synthetic_payload
  expect_within: 5m
  synthetic_payload:
    first_name: "Test"
    last_name: "User"
    email: "test+smoke@dynasty.internal"
    utm_source: "smoke"

rollback:
  - remove_code
  - unset_env
  - redeploy

estimated_deploy_seconds: 60

vendor_variant:
  crm: [suitedash, hubspot, servicetitan, housecallpro]

persona_fit:
  solo_steve: 0.95
  manager_maria: 0.9
  owner_omar: 0.9
  startup_sam: 0.95
  agency_alex: 0.85

pricing:
  service_fee_monthly_usd: 9
  one_time_setup_usd: 19
  expected_tool_cost_usd: 0
