async function ai(prompt,max=5500){const r=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:max,messages:[{role:'user',content:prompt}]})});if(!r.ok)throw new Error(`AI API ${r.status}`);const d=await r.json();const t=d.content?.find(b=>b.type==='text')?.text||'';const m=t.match(/\{[\s\S]*\}/);if(!m)throw new Error('No JSON in response');return JSON.parse(m[0]);}

    addP('g1','Generating DESIGN.md + CLAUDE.md','Calling Claude AI…','⬡ Design System');setP('g1','run');
    let df;try{df=await genDesign();setP('g1','ok',`${((df.design_md?.length||0)/1000).toFixed(1)}k chars`);}catch(e){setP('g1','er',e.message);throw e;}
    addP('g2','Generating SPEC, ROADMAP, README, MANUAL-ACTIONS, data model, API contracts, KB','Calling Claude AI…','⬡ Product Docs');setP('g2','run');
    let dc;try{dc=await genDocs();setP('g2','ok','8 docs ready');}catch(e){setP('g2','er',e.message);throw e;}
    addP('g3','Generating BUSINESS-SYSTEM + AGENT-SYSTEM + REVENUE-MODEL + GTM + FAILURE-MODES','Calling Claude AI…','⬡ Business System');setP('g3','run');
    let bz;try{bz=await genBizSystem();setP('g3','ok','5 business files ready');}catch(e){setP('g3','er',e.message);throw e;}
    addP('g4','Generating FastAPI backend + Dockerfile + docker-compose','Calling Claude AI…','⬡ Backend');setP('g4','run');
    let be;try{be=await genBackend();setP('g4','ok','Production backend code generated');}catch(e){setP('g4','er',e.message);throw e;}
    addP('dx','Fetching DYNASTY-DESIGN.md from master','','⬡ GitHub');setP('dx','run');
    let dy='';try{const r=await fetch(`https://api.github.com/repos/${ORG}/DYNASTY/contents/DYNASTY-DESIGN.md`,{headers:{'Authorization':`token ${GHT}`}});if(r.ok){const d=await r.json();dy=decodeURIComponent(escape(atob(d.content.replace(/\n/g,''))));}setP('dx','ok');}catch{setP('dx','sk','Skipped');}
    addP('cr',`Creating github.com/${ORG}/${repo}`);setP('cr','run');
    const cr=await gh(`/repos/${TMPL}/generate`,'POST',{owner:ORG,name:repo,description:`${name} — Dynasty Empire business system`,private:true,include_all_branches:false});
    if(!cr.ok&&cr.status!==422){const e=await cr.json();if(!e.message?.includes('already exists'))throw new Error(e.message);}
    await new Promise(r=>setTimeout(r,3500));setP('cr','ok');
    const files={'DESIGN.md':df.design_md,'CLAUDE.md':df.claude_md,'AGENTS.md':staticAgents(),'SPEC.md':dc.spec_md,'ROADMAP.md':dc.roadmap_md,'README.md':dc.readme_md,'MANUAL-ACTIONS.md':dc.manual_md,'.env.example':dc.env_ex,'.gitignore':staticGI(),'docs/DATA-MODEL.md':dc.data_model,'docs/API-CONTRACTS.md':dc.api_contracts,'docs/KB-OUTLINES.md':dc.kb_outlines,'docs/DESIGN-DECISIONS.md':staticDD(),'BUSINESS-SYSTEM.md':bz.biz_system,'AGENT-SYSTEM.md':bz.agent_system,'REVENUE-MODEL.md':bz.revenue_model,'GTM-PLAYBOOK.md':bz.gtm_playbook,'FAILURE-MODES.md':bz.failure_modes,'backend/main.py':be.main_py,'backend/requirements.txt':be.requirements,'backend/Dockerfile':be.dockerfile,'docker-compose.yml':be.docker_compose};
    if(dy)files['DYNASTY-DESIGN.md']=dy;
    const fl=Object.entries(files);
    addP('pf',`Pushing ${fl.length} files`);setP('pf','run',`0/${fl.length}…`);
    for(let i=0;i<fl.length;i++){const[p,c]=fl[i];await pushF(`${ORG}/${repo}`,p,c,`feat: dynasty scaffold — ${p}`);setP('pf','run',`${i+1}/${fl.length} — ${p}`);}
    setP('pf','ok',`${fl.length} files live`);
    const ftasks=Object.entries(S.fs).filter(([,v])=>v).map(([k])=>k);
    if(ftasks.length){addP('fl',`Tasking Flint (${ftasks.length} jobs)`);setP('fl','run');try{await fetch(FU,{method:'POST',headers:{'Authorization':`Bearer ${FT}`,'Content-Type':'application/json'},body:JSON.stringify({source:'dynasty-launcher',priority:'high',task:`PROVISION + DEPLOY\nProject: ${name}\nRepo: github.com/${ORG}/${repo}\nDomain: ${S.form.domain}\nType: ${S.type.label}\nStack: ${S.form.stack.join(', ')}\nRevenue: ${S.biz.model} at ${S.biz.price}\nTasks:\n${ftasks.map(k=>`- ${k}: ${FS[k]?.n}`).join('\n')}\n20i keys: c2387393b8125d868/c0471cadcfe5a7837\nGH token: ${GHT}\nReport each completion to outbox.`})});setP('fl','ok',`${ftasks.length} tasks queued`);}catch{setP('fl','sk','Flint unreachable');}}
    S.res={repo,fc:fl.length};S.step=4;render();
  }catch(e){S.err=e.message||'Unknown error';render();}
}
function bind(){
  document.querySelectorAll('[data-tid]').forEach(el=>el.addEventListener('click',()=>{S.type=TYPES.find(t=>t.id===el.dataset.tid);S.form.accent=S.type.a;S.form.stack=[...S.type.st];initSvcs(S.type);document.getElementById('n1')?.removeAttribute('disabled');document.querySelectorAll('.tc').forEach(c=>c.classList.remove('s'));el.classList.add('s');}));
  document.getElementById('n1')?.addEventListener('click',()=>{if(S.type){S.step=2;render();}});
  document.getElementById('bk')?.addEventListener('click',()=>{S.step=1;render();});
  document.getElementById('fn')?.addEventListener('input',e=>{S.form.name=e.target.value;const r=document.getElementById('fr');if(r&&!S.form.repo)r.value=sl(e.target.value);});
  document.getElementById('fd')?.addEventListener('input',e=>S.form.domain=e.target.value);
  document.getElementById('fr')?.addEventListener('input',e=>S.form.repo=e.target.value);
  document.getElementById('fde')?.addEventListener('input',e=>S.form.desc=e.target.value);
  document.querySelectorAll('[data-hex]').forEach(el=>el.addEventListener('click',()=>{S.form.accent=el.dataset.hex;document.querySelectorAll('.sw').forEach(s=>s.classList.remove('s'));el.classList.add('s');}));
  document.getElementById('fc')?.addEventListener('input',e=>{S.form.accent=e.target.value;document.querySelectorAll('.sw').forEach(s=>s.classList.remove('s'));});
  document.querySelectorAll('[data-stk]').forEach(el=>el.addEventListener('click',()=>{const s=el.dataset.stk;S.form.stack=S.form.stack.includes(s)?S.form.stack.filter(x=>x!==s):[...S.form.stack,s];el.classList.toggle('on');}));
  document.querySelectorAll('[data-bm]').forEach(el=>el.addEventListener('click',()=>{S.biz.model=el.dataset.bm;document.querySelectorAll('[data-bm]').forEach(x=>x.classList.remove('on'));el.classList.add('on');}));
  document.querySelectorAll('[data-bp]').forEach(el=>el.addEventListener('click',()=>{S.biz.price=el.dataset.bp;document.querySelectorAll('[data-bp]').forEach(x=>x.classList.remove('on'));el.classList.add('on');}));
  document.querySelectorAll('[data-ba]').forEach(el=>el.addEventListener('click',()=>{S.biz.acq=el.dataset.ba;document.querySelectorAll('[data-ba]').forEach(x=>x.classList.remove('on-pur'));el.classList.add('on-pur');}));
  document.querySelectorAll('[data-bv]').forEach(el=>el.addEventListener('click',()=>{S.biz.mvp=el.dataset.bv;document.querySelectorAll('[data-bv]').forEach(x=>x.classList.remove('on-grn'));el.classList.add('on-grn');}));
  document.querySelectorAll('[data-fs]').forEach(el=>el.addEventListener('click',()=>{const k=el.dataset.fs;S.fs[k]=!S.fs[k];el.querySelector('.sc').classList.toggle('ck',S.fs[k]);}));
  document.querySelectorAll('[data-ms]').forEach(el=>el.addEventListener('click',()=>{const k=el.dataset.ms;S.ms[k]=!S.ms[k];el.querySelector('.sc').classList.toggle('ck',S.ms[k]);}));
  document.getElementById('go')?.addEventListener('click',()=>{const n=document.getElementById('fn')?.value?.trim(),d=document.getElementById('fd')?.value?.trim(),r=document.getElementById('fr')?.value?.trim();if(!n||!d){alert('Project name and domain are required.');return;}S.form.name=n;S.form.domain=d;S.form.repo=r||sl(n);launch();});
  document.getElementById('rst')?.addEventListener('click',()=>{S={step:1,type:null,form:{name:'',domain:'',repo:'',desc:'',accent:'#635BFF',stack:[]},fs:{},ms:{},biz:{model:'subscription',price:'$497/mo',acq:'organic-seo',mvp:'72h'},prg:[],res:null,err:''};render();});
}
render();
</script>
