name: Deploy to Vercel
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: team_fuTLGjBMk3NAD32Bm5hA7wkr
  VERCEL_PROJECT_ID: prj_ohqrZxB5qgn4Hkc5rt8qZAG5fDHX

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Skip token-based deploy when VERCEL_TOKEN is not configured
        if: ${{ env.VERCEL_TOKEN == '' }}
        run: echo "Vercel Git integration will deploy this push; token-based CLI deploy is skipped."

      - uses: actions/checkout@v6
        if: ${{ env.VERCEL_TOKEN != '' }}

      - name: Install Vercel CLI
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: npm install -g vercel@latest

      - name: Pull Vercel config
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN"
