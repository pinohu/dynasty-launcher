name: Product alignment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-product:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Verify warranted surfaces vs code (no npm install)
        run: npm run verify:product
