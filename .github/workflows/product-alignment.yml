name: Product alignment

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-product:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
      - name: Run product and smoke regression suite
        run: npm test
